name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m
          only-new-issues: true

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"
          cache: true

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Verify FFmpeg
        run: ffmpeg -version

      - name: Run tests with coverage
        run: |
          set -o pipefail
          go test -json -race -coverprofile=coverage.out -covermode=atomic ./... \
            | tee test-results.json

      - name: Write test and coverage summary
        if: always()
        run: |
          test -f test-results.json || : > test-results.json
          test -f coverage.out || printf 'mode: atomic\n' > coverage.out
          go run ./cmd/ci-summary \
            -test-json test-results.json \
            -coverage coverage.out \
            -output "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov (optional)
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Run e2e tests
        run: go test -tags=e2e -race -count=1 -timeout 60s ./test/e2e/

  live-download:
    name: Build & Live Download
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"
          cache: true

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Build pull request binary
        run: |
          mkdir -p build
          go build -trimpath -o build/orphion ./cmd/orphion
          ./build/orphion version

      - name: Download and validate Shirokuma Cafe episode 1
        env:
          ORPHION_BIN: ${{ github.workspace }}/build/orphion
          FFMPEG_BIN: /usr/bin/ffmpeg
          FFPROBE_BIN: /usr/bin/ffprobe
          ORPHION_LIVE_TITLE: Shirokuma Cafe
          ORPHION_LIVE_EPISODE: "1"
          ORPHION_PROBE_SECONDS: "15"
        run: bash scripts/live-download-check.sh

  live-bettermelon:
    name: Smoke Test (Bettermelon)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ".go-version"
          cache: true

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Build pull request binary
        run: |
          mkdir -p build
          go build -trimpath -o build/orphion ./cmd/orphion
          ./build/orphion version

      - name: Write config
        run: |
          mkdir -p ~/.config/orphion
          printf 'output_dir: /tmp/orphion-smoke\nprovider: bettermelon\nffmpeg_path: /usr/bin/ffmpeg\n' > ~/.config/orphion/config.yaml

      - name: Search returns results
        run: |
          output="$(./build/orphion search --type anime 'Dagashi Kashi')"
          printf 'Search results:\n%s\n' "$output"
          count="$(printf '%s' "$output" | wc -l | tr -d '[:space:]')"
          [ "$count" -ge 1 ] || { echo "No search results"; exit 1; }

      - name: Episodes API reachable
        run: |
          title_id="$(./build/orphion search --type anime 'Dagashi Kashi' | head -1 | awk '{print $1}')"
          printf 'Title ID: %s\n' "$title_id"
          [ -n "$title_id" ] || { echo "No title ID from search"; exit 1; }
          ORPHION_SMOKE_ANIME_ID="$title_id" go test -race -count=1 -run TestSmokeAPI -timeout 60s ./internal/provider/bettermelon/
