# golangci-lint configuration for Orphion
# See: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  go: "1.26"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - prealloc
    - bodyclose
    - nilerr
    - noctx
    - whitespace
    - stylecheck

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/distiled/orphion
  misspell:
    locale: US
  staticcheck:
    checks: ["all"]

issues:
  exclude-use-default: false
  max-same-issues: 0
  max-issues-per-linter: 0