server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.m3u8$ {
        types {
            application/vnd.apple.mpegurl m3u8;
        }
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ~* \.ts$ {
        types {
            video/mp2t ts;
        }
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ~* \.srt$ {
        default_type application/x-subrip;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }
}
